{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Add Task</h2>

<form method="POST">

    <div class="mb-3">
        <label>Task Title</label>
        <input
            type="text"
            name="title"
            class="form-control"
            required
        >
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea
            name="description"
            class="form-control"
            rows="4"
        ></textarea>
    </div>

    <div class="mb-3">
        <label>Priority</label>

        <select
            name="priority"
            class="form-control"
        >
            <option>High</option>
            <option selected>Medium</option>
            <option>Low</option>
        </select>

    </div>

    <div class="mb-3">
        <label>Due Date</label>

        <input
            type="date"
            name="due_date"
            class="form-control"
        >

    </div>

    <button class="btn btn-success">
        Save Task
    </button>

</form>

{% endblock %}
