{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">Login</h2>

            <form method="POST">

                <div class="mb-3">
                    <label>Email</label>
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Login
                </button>

            </form>

            <div class="text-center mt-3">
                Don't have an account?
                <a href="/register">Register</a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
